<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Launching Inventory Manager…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { text-align: center; padding: 48px; }
    .title { font-size: 20px; font-weight: 700; color: #38bdf8; margin-bottom: 24px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(56,189,248,0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #94a3b8; }
    .error {
      color: #f87171; font-size: 14px; margin-top: 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 12px 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">📦 Inventory Manager</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Signing in as Admin…</div>
    <div class="error" id="error" style="display:none;"></div>
  </div>
  <script>
    (async () => {
      const API_URL = 'http://localhost:8000';
      const EMAIL   = 'admin@inventory.app';
      const PASS    = 'admin123';

      const statusEl = document.getElementById('status');
      const errorEl  = document.getElementById('error');
      const spinner  = document.getElementById('spinner');

      function decodeJwt(token) {
        try {
          return JSON.parse(atob(token.split('.')[1]));
        } catch {
          return {};
        }
      }

      try {
        statusEl.textContent = 'Contacting backend…';

        const res = await fetch(`${API_URL}/api/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: EMAIL, password: PASS })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();

        // Build user object exactly the same way app.js handleLogin() does (line 316-322)
        const payload = decodeJwt(data.access_token);
        const user = {
          id:    payload.sub,
          email: EMAIL,
          name:  EMAIL.split('@')[0],   // same as app.js: email.split('@')[0]
          role:  payload.role || 'staff'
        };

        // Store in localStorage with exact same keys app.js uses
        localStorage.setItem('access_token',  data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user_info',     JSON.stringify(user));

        statusEl.textContent = `✓ Logged in as ${user.role} (${user.name}) — redirecting…`;
        spinner.style.borderTopColor = '#34d399';

        // Redirect to the main app at port 8080
        setTimeout(() => { window.location.href = 'http://localhost:8080/'; }, 600);

      } catch (err) {
        spinner.style.display = 'none';
        statusEl.textContent  = 'Login failed';
        errorEl.style.display = 'block';
        errorEl.textContent   = `Error: ${err.message}`;
      }
    })();
  </script>
</body>
</html>
