version: "3.9"

services:
  # ── PostgreSQL ──
  db:
    ports: [] # Close database port to the public internet in production
    restart: always

  # ── Redis ──
  redis:
    ports: [] # Close Redis port to the public internet in production
    restart: always

  # ── FastAPI Application ──
  api:
    ports: [] # Do not expose API directly; reverse-proxied via Nginx
    restart: always
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory_secret}@db:5432/${POSTGRES_DB:-inventory_db}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false

  # ── Nginx Web Frontend (with SSL) ──
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: always
