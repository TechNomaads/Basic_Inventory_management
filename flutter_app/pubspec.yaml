name: inventory_app
description: Inventory Management System - Android Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Local Database (offline cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # Barcode Scanner
  mobile_scanner: ^5.1.1

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI Enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  vibration: ^1.9.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.3.0
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  uuid: ^4.4.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
